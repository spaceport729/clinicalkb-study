<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>ClinicalKB Study</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div style="display:flex;align-items:center;gap:8px;min-width:0">
        <button id="topbar-back" onclick="CKB.goBack()" style="display:none" aria-label="Go back">&larr;</button>
        <h1 id="topbar-title" style="margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">ClinicalKB Study</h1>
      </div>
      <button id="dark-toggle" aria-label="Toggle dark mode">
        <span id="dark-icon">&#9790;</span>
      </button>
    </header>

    <main id="main">
      <!-- Home -->
      <div id="view-home" class="view active">
        <div class="home-header">
          <div class="home-stats-row" id="home-stats-row"></div>
        </div>
        <div class="home-grid" id="home-grid"></div>
      </div>

      <!-- Presentation (CC Decision Tree) -->
      <div id="view-presentation" class="view">
        <div id="presentation-content"></div>
      </div>

      <!-- Condition (Deep Dive) -->
      <div id="view-condition" class="view">
        <div id="condition-content"></div>
      </div>

      <!-- A&P (System Deep Dive) -->
      <div id="view-anatomy" class="view">
        <div id="anatomy-content"></div>
      </div>

      <!-- Med Class -->
      <div id="view-medclass" class="view">
        <div id="medclass-content"></div>
      </div>

      <!-- Principle -->
      <div id="view-principle" class="view">
        <div id="principle-content"></div>
      </div>

      <!-- Code (Decision Tree Test) -->
      <div id="view-code" class="view">
        <div id="code-content"></div>
      </div>

      <!-- Progress Dashboard -->
      <div id="view-progress" class="view">
        <div class="dashboard" id="dashboard"></div>
      </div>

      <!-- Browse -->
      <div id="view-browse" class="view">
        <div class="browse-controls" id="browse-controls"></div>
        <div class="browse-list" id="browse-list"></div>
      </div>

      <!-- Note Detail -->
      <div id="view-note" class="view">
        <div class="note-content" id="note-content"></div>
      </div>
    </main>

    <nav id="navbar">
      <button class="nav-btn active" data-view="home">
        <span class="nav-icon">&#9733;</span>
        <span class="nav-label">Today</span>
      </button>
      <button class="nav-btn" data-view="browse">
        <span class="nav-icon">&#128218;</span>
        <span class="nav-label">Browse</span>
      </button>
      <button class="nav-btn" data-view="progress">
        <span class="nav-icon">&#128200;</span>
        <span class="nav-label">Progress</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
